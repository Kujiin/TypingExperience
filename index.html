<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TypeFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        color-scheme: dark;
        --accent: #7d7260;
        --surface: #29231f;
      }

      body {
        min-height: 100vh;
        background: radial-gradient(circle at top, rgba(22, 28, 39, 0.78), transparent 25%),
          linear-gradient(180deg, #06070f 0%, #05060b 48%, #02040a 100%);
        font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
      }

      .word-chip {
        transition: all 150ms ease;
      }

      .word-chip.active {
        color: var(--accent);
      }

      .word-chip.done {
        color: #aaa38c;
      }

      .keycap {
        transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
        background: var(--surface);
        color: #ddd7cc;
      }

      .keycap.pressed {
        transform: translateY(2px) scale(0.98);
      }

      .floating-key {
        position: absolute;
        z-index: 40;
        pointer-events: none;
        animation: floatKey 700ms ease-out forwards;
        background: rgba(125, 114, 96, 0.95);
        color: #faf3e8;
        padding: 0.85rem 1rem;
        border-radius: 14px;
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        box-shadow: 0 22px 54px rgba(125, 114, 96, 0.28);
      }

      @keyframes floatKey {
        0% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -180%) scale(1.15);
        }
      }

      .burst {
        position: absolute;
        pointer-events: none;
        border-radius: 9999px;
        animation: floatBurst 650ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.4);
      }

      @keyframes floatBurst {
        0% {
          opacity: 0.95;
          transform: translate(-50%, -50%) scale(0.5);
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -200%) scale(1.6);
        }
      }

      .typing-shell {
        min-height: 100vh;
      }

      .faded-panel {
        background: rgba(41, 35, 31, 0.94);
        box-shadow: 0 35px 90px rgba(0, 0, 0, 0.28);
      }
    </style>
  </head>
  <body class="text-slate-100">
    <div class="typing-shell flex items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
      <div class="w-full max-w-7xl rounded-[36px] bg-[#090704]/95 p-6 shadow-[0_60px_150px_-60px_rgba(15,23,42,0.95)] backdrop-blur-xl">
        <header class="mb-10 grid gap-6 lg:grid-cols-[1.4fr_auto] lg:items-end">
          <div class="space-y-2">
            <h1 class="text-6xl font-semibold tracking-tight text-white sm:text-7xl lg:text-8xl">TypeFlow</h1>
          </div>
        </header>

        <section class="grid gap-6 xl:grid-cols-[1.4fr_0.95fr]">
          <div class="rounded-[32px] faded-panel p-6">
            <div class="mb-5 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
              <p id="progressText" class="text-sm text-slate-300">Progress: 0 / 15</p>
              <select id="wordCountSelect" class="rounded-full bg-[#29231f] px-4 py-3 text-sm text-white outline-none transition hover:bg-[#3b322c] focus:ring-2 focus:ring-[#7d7260]/40">
                <option value="10">10</option>
                <option value="15" selected>15</option>
                <option value="20">20</option>
                <option value="25">25</option>
              </select>
            </div>
            <div id="wordDisplay" class="rounded-[28px] bg-[#29231f]/95 p-6 text-xl leading-[2.6rem] text-slate-100"></div>
            <div class="mt-8 rounded-[28px] bg-[#1f1915]/95 p-4">
              <div class="mb-4 flex items-center justify-between">
                <div>
                  <p class="text-xs uppercase tracking-[0.35em] text-slate-400">Keyboard</p>
                  <h3 class="text-lg font-semibold text-white">Practice in the same panel</h3>
                </div>
                <div class="rounded-full bg-[#7d7260]/15 px-4 py-2 text-sm text-[#7d7260]">Live</div>
              </div>
              <div class="rounded-[24px] bg-[#29231f]/90 p-4 mb-6">
                <label for="typingInput" class="text-xs uppercase tracking-[0.35em] text-slate-400">Type panel</label>
                <input id="typingInput" class="mt-3 w-full rounded-[24px] bg-[#29231f] px-5 py-4 text-lg text-white outline-none ring-0 transition focus:ring-2 focus:ring-[#7d7260]/30" autocomplete="off" spellcheck="false" placeholder="Start typing here..." />
                <p class="mt-3 text-sm leading-6 text-slate-400">Press Space or Enter to submit each word.</p>
              </div>
              <div id="keyboardSurface" class="relative overflow-hidden rounded-[24px] bg-[#29231f]/95 p-3"></div>
            </div>
          </div>

          <aside class="space-y-6">
            <div id="sessionResults" class="hidden rounded-[32px] faded-panel p-6">
              <div class="grid gap-4 sm:grid-cols-2">
                <div class="rounded-[24px] bg-[#29231f]/90 p-5 text-center">
                  <p class="text-xs uppercase tracking-[0.35em] text-slate-400">WPM</p>
                  <p id="wpmValue" class="mt-4 text-4xl font-semibold text-white">0</p>
                </div>
                <div class="rounded-[24px] bg-[#29231f]/90 p-5 text-center">
                  <p class="text-xs uppercase tracking-[0.35em] text-slate-400">Accuracy</p>
                  <p id="accuracyValue" class="mt-4 text-4xl font-semibold text-white">100%</p>
                </div>
                <div class="rounded-[24px] bg-[#29231f]/90 p-5 text-center">
                  <p class="text-xs uppercase tracking-[0.35em] text-slate-400">Time</p>
                  <p id="timeValue" class="mt-4 text-4xl font-semibold text-white">00:00</p>
                </div>
                <div class="rounded-[24px] bg-[#29231f]/90 p-5 text-center">
                  <p class="text-xs uppercase tracking-[0.35em] text-slate-400">Best</p>
                  <p id="bestValue" class="mt-4 text-4xl font-semibold text-white">0</p>
                </div>
              </div>
            </div>
            <div class="grid gap-3 sm:grid-cols-2">
              <button id="randomizeBtn" class="rounded-[28px] bg-[#7d7260] px-5 py-4 text-sm font-semibold uppercase tracking-[0.25em] text-[#111010] transition hover:bg-[#958568]">Randomize</button>
              <button id="restartBtn" class="rounded-[28px] bg-[#29231f] px-5 py-4 text-sm font-semibold uppercase tracking-[0.25em] text-white transition hover:bg-[#3b322c]">Restart</button>
            </div>
          </aside>
        </section>

      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
